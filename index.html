<!DOCTYPE html>

        .traffic-container {

        }

        .traffic-table th {

<body>
    <div class="header">
        <div>
            <h1 id="raceTitle">54. ADAC RAVENOL 24h Nurburgring</h1>
            <div class="race-info" id="raceInfo">Loading...</div>
        </div>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>
    <div class="container"><div id="app"><div class="loading"><div class="spinner"></div>Connecting to live timing...</div></div></div>

<script>
const WS_URL = 'wss://livetiming.azurewebsites.net';
const EVENT_ID = '50';
const DRIVER_COLORS = [
    {border:'#3b82f6',name:'#93bbfc'},{border:'#a855f7',name:'#d8b4fe'},
    {border:'#22c55e',name:'#86efac'},{border:'#f59e0b',name:'#fde68a'},
    {border:'#ef4444',name:'#fca5a5'},{border:'#06b6d4',name:'#67e8f9'},
];
const CAR_COLORS = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#06b6d4','#ec4899','#f97316'];

let resultsData = null, stintsData = null, lapData = {};
let currentView = 'leaderboard', currentCar = null;
let compareMode = false, compareSet = new Set();

// ── WebSocket ──
class LiveTimingConnection {
    constructor(ch, onData) { this.ch = ch; this.onData = onData; this.ws = null; this.connect(); }
    connect() {
        this.ws = new WebSocket(WS_URL);
        this.ws.onopen = () => this.ws.send(JSON.stringify({eventId:EVENT_ID,eventPid:this.ch,clientLocalTime:Date.now()}));
        this.ws.onmessage = (e) => { try { const m=JSON.parse(e.data); if(m.PID!=='LTS_TIMESYNC') this.onData(m); } catch(x){} };
        this.ws.onclose = () => setTimeout(()=>this.connect(),3000);
        this.ws.onerror = () => {};
    }
}

function fetchLapData(carNo) {
    return new Promise(resolve => {
        if (lapData[carNo]) return resolve(lapData[carNo]);
        const session = resultsData ? resultsData.SESSION : '';
        const ws = new WebSocket(WS_URL);
        ws.onopen = () => ws.send(JSON.stringify({eventId:EVENT_ID,eventPid:[7],clientLocalTime:Date.now(),session,startingNo:String(carNo)}));
        ws.onmessage = (e) => { const m=JSON.parse(e.data); if(m.PID==='LTS_TIMESYNC')return; if(m.PID==='7'&&String(m.N)===String(carNo)){lapData[carNo]=m;ws.close();resolve(m);} };
        ws.onerror = () => resolve(null);
        setTimeout(()=>{ws.close();resolve(null);},15000);
    });
}

// ── Helpers ──
function formatGap(g){return !g||g==='----LAP 0'?'-':g;}
function lapTimeToSeconds(t){if(!t||t==='')return Infinity;const p=t.split(':');if(p.length===3)return parseInt(p[0])*3600+parseInt(p[1])*60+parseFloat(p[2]);if(p.length===2)return parseInt(p[0])*60+parseFloat(p[1]);return parseFloat(p[0]);}
function secondsToTime(s){if(!isFinite(s)||s<=0)return'-';if(s>=3600){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=(s%60).toFixed(3);return`${h}:${String(m).padStart(2,'0')}:${sc.padStart(6,'0')}`;}const m=Math.floor(s/60),sc=(s%60).toFixed(3);return`${m}:${sc.padStart(6,'0')}`;}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

// ── Driver-to-lap mapping ──
function assignDriversToLaps(lapsMsg, carNo) {
    const si = stintsData ? stintsData.STINTS.find(s=>s.STNR===carNo) : null;
    if(!si||!si.DRIVERS||!lapsMsg||!lapsMsg.DATA) return null;
    const data=lapsMsg.DATA, drivers=si.DRIVERS;
    function s1Sec(s1){const p=s1.split(':');return p.length===2?parseInt(p[0])*60+parseFloat(p[1]):parseFloat(p[0]);}
    const pitOut=new Set();
    data.forEach((l,i)=>{if(i===0)return;if(s1Sec(l.S1)>120)pitOut.add(l.L);});
    let segments=[],cur=[];
    data.forEach(l=>{if(pitOut.has(l.L)&&cur.length>0){segments.push(cur);cur=[];}cur.push(l.L);});
    if(cur.length>0)segments.push(cur);
    const ds=drivers.map((d,idx)=>({name:`${d.PRENAME} ${d.NAME}`,totalLaps:parseInt(d.LAPS)||0,stintLaps:parseInt(d.STINTLAPS)||0,colorIdx:idx,id:d.ID}));
    const segLens=segments.map(s=>s.length);
    function solve(si,rem,asgn){
        if(si>=segments.length)return rem.every(l=>l===0)?[...asgn]:null;
        for(let di=0;di<rem.length;di++){if(rem[di]<=0)continue;let c=0;
        for(let e=si;e<segments.length;e++){c+=segLens[e];if(c>rem[di])break;const nr=[...rem];nr[di]-=c;const na=[...asgn];for(let s=si;s<=e;s++)na[s]=di;const r=solve(e+1,nr,na);if(r)return r;}}return null;}
    let sdm=null;
    if(segments.length<=20&&drivers.length<=6) sdm=solve(0,ds.map(d=>d.totalLaps),new Array(segments.length).fill(-1));
    if(!sdm){sdm=new Array(segments.length).fill(-1);const rem=ds.map(d=>d.totalLaps);let di=0;
    for(let si=0;si<segments.length;si++){let found=false;for(let a=0;a<ds.length;a++){const t=(di+a)%ds.length;if(rem[t]>=segLens[si]){sdm[si]=t;rem[t]-=segLens[si];if(rem[t]===0)di=(t+1)%ds.length;found=true;break;}}
    if(!found){const mx=rem.indexOf(Math.max(...rem));sdm[si]=mx;rem[mx]-=segLens[si];}}}
    const ldm={};segments.forEach((seg,si)=>{const d=sdm[si]>=0&&sdm[si]<ds.length?ds[sdm[si]]:null;seg.forEach(ln=>{ldm[ln]=d;});});
    return {lapDriverMap:ldm,driverStints:ds,segments,segmentDriverMap:sdm};
}

// ── Current stint info ──
function getCurrentStintInfo(carNo) {
    const si = stintsData ? stintsData.STINTS.find(s=>s.STNR===carNo) : null;
    if (!si) return null;
    const active = si.DRIVERS.find(d => d.STATUS === '2');
    if (!active) return null;
    const stintLaps = parseInt(active.STINTLAPS) || 0;
    const totalDriverLaps = parseInt(active.LAPS) || 0;
    const maxStintLaps = 8;
    const remaining = Math.max(0, maxStintLaps - stintLaps);

    // STINTTIME includes pit wait time, so use driver's TOTALTIME/LAPS for avg
    const totalTimeSec = lapTimeToSeconds(active.TOTALTIME);
    const driverAvg = totalDriverLaps > 0 && isFinite(totalTimeSec) ? totalTimeSec / totalDriverLaps : 0;

    // If we have lap data cached, use last clean laps for better avg
    const ld = lapData[carNo];
    let recentAvg = 0;
    if (ld && ld.DATA && ld.DATA.length > 0) {
        const allTimes = ld.DATA.map(d => lapTimeToSeconds(d.T)).filter(t => isFinite(t));
        const best = Math.min(...allTimes);
        const clean = allTimes.filter(t => t < best * 1.3);
        if (clean.length > 0) recentAvg = clean.reduce((a, b) => a + b, 0) / clean.length;
    }

    // Use the best available avg: lap data clean avg > driver total avg
    const avgLap = recentAvg > 0 ? recentAvg : driverAvg;

    const estStintTotal = avgLap > 0 ? avgLap * maxStintLaps : 0;
    const estRemainingTime = avgLap > 0 ? avgLap * remaining : 0;

    return {
        driver: `${active.PRENAME} ${active.NAME}`,
        stintLaps,
        stintTime: active.STINTTIME || '-',
        totalDriverLaps,
        totalTime: active.TOTALTIME || '-',
        estimatedRemaining: remaining,
        maxStintLaps,
        pct: Math.min(100, Math.round((stintLaps / maxStintLaps) * 100)),
        avgLap: avgLap > 0 ? secondsToTime(avgLap) : '-',
        estStintTotal: estStintTotal > 0 ? secondsToTime(estStintTotal) : '-',
        estRemainingTime: estRemainingTime > 0 ? secondsToTime(estRemainingTime) : '-',
    };
}

function renderLeaderboard() {
    if (!resultsData) return;
    const R = resultsData.RESULT;
    let html = `<div class="lb-toolbar">
        <button class="btn" onclick="showTrackMap()">🗺 Track Map</button>
        <button class="btn ${compareMode?'active':''}" onclick="toggleCompareMode()">${compareMode?'Cancel Compare':'Compare'}</button>
        ${compareMode?`<span class="compare-count">${compareSet.size} selected</span>
        <button class="btn compare-go" ${compareSet.size<2?'disabled':''} onclick="showCompare()">Compare Selected</button>`:''}
    </div>`;
    html += `<table class="leaderboard-table"><thead><tr>
        ${compareMode?'<th class="cb-cell"></th>':''}
        <th>Pos</th><th>+/-</th><th>#</th><th>Team / Driver</th><th>Class</th><th>Car</th><th>Laps</th><th>Last Lap</th><th>Best Lap</th><th>Stint Avg</th><th>Race Avg</th><th>Gap</th><th>Pits</th>
    </tr></thead><tbody>`;
    R.forEach(r => {
        const pc=r.POSITION<=3?`pos-${r.POSITION}`:'';
        const cc=r.CHG>0?'chg-up':r.CHG<0?'chg-down':'';
        const ct=r.CHG>0?`+${r.CHG}`:r.CHG<0?r.CHG:'';
        const sel=compareSet.has(r.STNR);
        // Stint avg: current driver's STINTTIME / STINTLAPS
        let stintAvg='-', raceAvg='-';
        const si=stintsData?stintsData.STINTS.find(s=>s.STNR===r.STNR):null;
        if(si){
            const active=si.DRIVERS.find(d=>d.STATUS==='2');
            if(active){
                const sl=parseInt(active.STINTLAPS)||0;
                const st=lapTimeToSeconds(active.STINTTIME);
                if(sl>0&&isFinite(st)) stintAvg=secondsToTime(st/sl);
            }
            // Race avg: sum of all drivers' TOTALTIME / sum of all drivers' LAPS
            let totalSec=0, totalLaps=0;
            si.DRIVERS.forEach(d=>{
                const l=parseInt(d.LAPS)||0;
                const t=lapTimeToSeconds(d.TOTALTIME);
                if(l>0&&isFinite(t)){totalSec+=t;totalLaps+=l;}
            });
            if(totalLaps>0) raceAvg=secondsToTime(totalSec/totalLaps);
        }
        html += `<tr class="${sel?'selected-row':''}" onclick="${compareMode?`toggleCompare('${r.STNR}')`:`showCarDetail('${r.STNR}')`}">
            ${compareMode?`<td class="cb-cell"><input type="checkbox" ${sel?'checked':''} onclick="event.stopPropagation();toggleCompare('${r.STNR}')"></td>`:''}
            <td class="pos ${pc}">${r.POSITION}</td><td class="${cc}">${ct}</td>
            <td><span class="car-num">${r.STNR}</span></td>
            <td><div class="team-name">${escH(r.TEAM)}</div><div class="driver-name">${escH(r.NAME)}</div></td>
            <td><span class="class-badge">${r.CLASSNAME}</span></td>
            <td>${escH(r.CAR)}</td><td>${r.LAPS}</td>
            <td style="font-family:monospace">${r.LASTLAPTIME||'-'}</td>
            <td class="fastest" style="font-family:monospace">${r.FASTESTLAP||'-'}</td>
            <td style="font-family:monospace;color:#06b6d4">${stintAvg}</td>
            <td style="font-family:monospace;color:#94a3b8">${raceAvg}</td>
            <td style="font-family:monospace">${formatGap(r.GAP)}</td>
            <td>${r.PITSTOPCOUNT||0}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('app').innerHTML = html;
}

function analyzeStints(laps,car,dm){
    if(!laps||!laps.DATA||!laps.DATA.length)return;
    const D=laps.DATA,times=D.map(d=>lapTimeToSeconds(d.T)),ct=times.filter(t=>isFinite(t)).sort((a,b)=>a-b);
    const med=ct[Math.floor(ct.length*.3)],pth=med*1.4;
    let segs,sdm;
    if(dm){segs=dm.segments;sdm=dm.segmentDriverMap;}else{segs=[];let c=[];D.forEach((l,i)=>{const t=lapTimeToSeconds(l.T);if(t>pth&&i>0&&c.length>0){segs.push(c);c=[];}c.push(l.L);});if(c.length>0)segs.push(c);sdm=new Array(segs.length).fill(-1);}
    const el=document.getElementById('stint-breakdown');if(!el)return;
    let h=`<h3 style="color:#94a3b8;margin-bottom:12px;font-size:.9rem">Stint Breakdown (${segs.length} stints)</h3><table class="stints-table"><thead><tr><th>Stint</th><th>Driver</th><th>Laps</th><th>Lap Range</th><th>Avg Lap</th><th>Best Lap</th><th>Worst Lap</th><th>Consistency</th></tr></thead><tbody>`;
    segs.forEach((seg,i)=>{const st=seg.map(ln=>{const l=D.find(d=>d.L===ln);return l?lapTimeToSeconds(l.T):0;}).filter(t=>t>0&&t<pth);
        const avg=st.length?st.reduce((a,b)=>a+b,0)/st.length:0,best=st.length?Math.min(...st):0,worst=st.length?Math.max(...st):0;
        const con=st.length>1?Math.sqrt(st.reduce((s,t)=>s+Math.pow(t-avg,2),0)/st.length):0;
        const di=sdm[i],dr=dm&&di>=0?dm.driverStints[di]:null,co=dr?DRIVER_COLORS[dr.colorIdx%DRIVER_COLORS.length]:null;
        h+=`<tr><td style="font-weight:600">Stint ${i+1}</td><td style="color:${co?co.name:'#64748b'};font-weight:500">${dr?escH(dr.name):'?'}</td><td>${seg.length}</td><td>Lap ${seg[0]}-${seg[seg.length-1]}</td><td style="font-family:monospace">${secondsToTime(avg)}</td><td style="font-family:monospace;color:#a855f7">${secondsToTime(best)}</td><td style="font-family:monospace;color:#f59e0b">${secondsToTime(worst)}</td><td style="font-family:monospace">${con.toFixed(1)}s</td></tr>`;});
    el.innerHTML=h+'</tbody></table>';
}

const CMP_SECTIONS = [
    {id:'overview',label:'Overview'},
    {id:'laptimes',label:'Lap Times'},
    {id:'sectors',label:'Sectors & Speed'},

// ── Quick Compare from detail page ──
let qcOpen = false, qcSelected = new Set();

function openQuickCompare(currentCarNo) {
    const panel = document.getElementById('quick-compare-panel');
    if (qcOpen) { panel.innerHTML = ''; qcOpen = false; return; }
    qcOpen = true;
    qcSelected.clear();
    const R = resultsData.RESULT.filter(r => r.STNR !== currentCarNo);

        <input class="qc-search" placeholder="Search team, driver, #..." oninput="filterQcList('${currentCarNo}', this.value)">

        <div class="qc-result" id="qc-result"></div>

function buildQcList(items) {
    return items.map(r =>
        `<label class="qc-item"><input type="checkbox" ${qcSelected.has(r.STNR)?'checked':''} onchange="toggleQcItem('${r.STNR}')"><span class="qc-num">#${r.STNR}</span><span class="qc-team">${escH(r.TEAM)}</span><span class="qc-pos">P${r.POSITION} ${escH(r.NAME)}</span></label>`
    ).join('');
}

function filterQcList(currentCarNo, query) {
    const q = query.toLowerCase();
    const R = resultsData.RESULT.filter(r => r.STNR !== currentCarNo && (
        r.TEAM.toLowerCase().includes(q) || r.NAME.toLowerCase().includes(q) ||
        r.STNR.includes(q) || r.CAR.toLowerCase().includes(q) || r.CLASSNAME.toLowerCase().includes(q)
    ));
    document.getElementById('qc-list').innerHTML = buildQcList(R);
}

function toggleQcItem(stnr) {
    qcSelected.has(stnr) ? qcSelected.delete(stnr) : qcSelected.add(stnr);
    const btn = document.getElementById('qc-go-btn');
    if (btn) btn.disabled = qcSelected.size === 0;
}

function runQuickCompare(currentCarNo) {
    const allNos = [currentCarNo, ...qcSelected];
    const cars = allNos.map(n => resultsData.RESULT.find(r => r.STNR === n)).filter(Boolean);
    const stints = allNos.map(n => stintsData ? stintsData.STINTS.find(s => s.STNR === n) : null);
    if (cars.length < 2) return;

    const panel = document.getElementById('qc-result');
    if (!panel) return;

    // Build comparison of header info
    let h = `<table class="cmp-table"><thead><tr><th>Metric</th>${cars.map((c,i) =>
        `<th style="color:${CAR_COLORS[i%CAR_COLORS.length]}">#${c.STNR} ${escH(c.TEAM)}</th>`
    ).join('')}</tr></thead><tbody>`;

    const rows = [
        ['Position', cars.map(c => c.POSITION), 'min'],
        ['Class', cars.map(c => c.CLASSNAME), null],
        ['Class Position', cars.map(c => c.CLASSRANK), 'min'],
        ['Car', cars.map(c => escH(c.CAR)), null],
        ['Current Driver', cars.map(c => escH(c.NAME)), null],
        ['Laps', cars.map(c => c.LAPS), 'max'],
        ['Best Lap', cars.map(c => c.FASTESTLAP || '-'), 'min_time'],
        ['Last Lap', cars.map(c => c.LASTLAPTIME || '-'), 'min_time'],
        ['Pit Stops', cars.map(c => c.PITSTOPCOUNT || '0'), 'min'],
        ['Total Pit Time', cars.map(c => c.TPST || '-'), 'min_time'],
        ['Gap to Leader', cars.map(c => formatGap(c.GAP)), null],
        ['Leading Laps', cars.map(c => c.LLT || '0'), 'max'],
    ];

    // Stint avg & Race avg
    const stintAvgs = stints.map(s => {
        if (!s) return '-';
        const a = s.DRIVERS.find(d => d.STATUS === '2');
        if (!a) return '-';
        const sl = parseInt(a.STINTLAPS) || 0, st = lapTimeToSeconds(a.STINTTIME);
        return sl > 0 && isFinite(st) ? secondsToTime(st / sl) : '-';
    });
    const raceAvgs = stints.map(s => {
        if (!s) return '-';
        let ts = 0, tl = 0;
        s.DRIVERS.forEach(d => { const l = parseInt(d.LAPS) || 0, t = lapTimeToSeconds(d.TOTALTIME); if (l > 0 && isFinite(t)) { ts += t; tl += l; } });
        return tl > 0 ? secondsToTime(ts / tl) : '-';
    });

    rows.push(['Stint Avg', stintAvgs, 'min_time']);
    rows.push(['Race Avg', raceAvgs, 'min_time']);

    // Current stint info
    const csLaps = stints.map(s => {
        if (!s) return '-';
        const a = s.DRIVERS.find(d => d.STATUS === '2');
        return a ? a.STINTLAPS : '-';
    });
    const csTime = stints.map(s => {
        if (!s) return '-';
        const a = s.DRIVERS.find(d => d.STATUS === '2');
        return a ? (a.STINTTIME || '-') : '-';
    });
    rows.push(['Current Stint Laps', csLaps, null]);
    rows.push(['Current Stint Time', csTime, null]);

    rows.forEach(([label, vals, mode]) => { h += cmpRow(label, vals, mode); });
    h += '</tbody></table>';
    panel.innerHTML = h;
}

function cmpStintProgressRows(stintResults,lapResults,carNos){
    let h='';
    h+=cmpRow('Current Driver',stintResults.map(s=>{if(!s)return'-';const a=s.DRIVERS.find(d=>d.STATUS==='2');return a?`${a.PRENAME} ${a.NAME}`:'-';}),null);
    h+=cmpRow('Stint Laps',stintResults.map(s=>{if(!s)return'-';const a=s.DRIVERS.find(d=>d.STATUS==='2');if(!a)return'-';const sl=parseInt(a.STINTLAPS)||0;return`${sl} / ~8`;}),null);
    h+=cmpRow('Stint Remaining',stintResults.map(s=>{if(!s)return'-';const a=s.DRIVERS.find(d=>d.STATUS==='2');if(!a)return'-';const sl=parseInt(a.STINTLAPS)||0;const rem=Math.max(0,8-sl);return`${rem} laps`;}),null);
    h+=cmpRow('Avg Lap',carNos.map((n,i)=>{const lr=lapResults[i];if(!lr||!lr.DATA||!lr.DATA.length)return'-';const ts=lr.DATA.map(d=>lapTimeToSeconds(d.T)).filter(t=>isFinite(t));const best=Math.min(...ts);const clean=ts.filter(t=>t<best*1.3);return clean.length?secondsToTime(clean.reduce((a,b)=>a+b,0)/clean.length):'-';}),'min_time');
    h+=cmpRow('Est. Remaining Time',stintResults.map((s,i)=>{if(!s)return'-';const a=s.DRIVERS.find(d=>d.STATUS==='2');if(!a)return'-';const sl=parseInt(a.STINTLAPS)||0;const rem=Math.max(0,8-sl);if(!rem)return'0:00.000';const lr=lapResults[i];let avg=0;if(lr&&lr.DATA&&lr.DATA.length){const ts=lr.DATA.map(d=>lapTimeToSeconds(d.T)).filter(t=>isFinite(t));const best=Math.min(...ts);const clean=ts.filter(t=>t<best*1.3);if(clean.length)avg=clean.reduce((a,b)=>a+b,0)/clean.length;}if(!avg){const tl=parseInt(a.LAPS)||0;const tt=lapTimeToSeconds(a.TOTALTIME);if(tl>0&&isFinite(tt))avg=tt/tl;}return avg>0?secondsToTime(avg*rem):'-';}),'min_time');
    h+=cmpRow('Stint Progress',stintResults.map(s=>{if(!s)return'-';const a=s.DRIVERS.find(d=>d.STATUS==='2');if(!a)return'-';const sl=parseInt(a.STINTLAPS)||0;const pct=Math.min(100,Math.round((sl/8)*100));return`<div style="display:flex;align-items:center;gap:8px"><div class="cs-progress-bar" style="flex:1;min-width:80px"><div class="cs-progress-fill" style="width:${pct}%"></div></div><span style="font-size:.75rem;color:#94a3b8">${pct}%</span></div>`;}),null);
    return h;
}

function cmpRow(label,vals,mode){
    let bestIdx=-1;
    if(mode==='min'){const nums=vals.map(v=>parseFloat(v));const mn=Math.min(...nums.filter(n=>!isNaN(n)));bestIdx=nums.indexOf(mn);}
    if(mode==='max'){const nums=vals.map(v=>parseFloat(v));const mx=Math.max(...nums.filter(n=>!isNaN(n)&&n>0));bestIdx=nums.indexOf(mx);}
    if(mode==='min_time'){const secs=vals.map(v=>lapTimeToSeconds(v));const mn=Math.min(...secs.filter(s=>isFinite(s)&&s>0));bestIdx=secs.indexOf(mn);}
    if(mode==='max_speed'){const nums=vals.map(v=>parseFloat(v));const mx=Math.max(...nums.filter(n=>!isNaN(n)&&n>0));bestIdx=nums.indexOf(mx);}
    let r=`<tr><td>${label}</td>`;
    vals.forEach((v,i)=>{r+=`<td class="${i===bestIdx?'cmp-best':''}">${v}</td>`;});
    return r+'</tr>';
}

// ── Track Map & Traffic Prediction ──
// Nürburgring combined layout (GP + Nordschleife) approximation as SVG path points
// 9 sectors mapped to positions along the track
const TRACK_POINTS = [
    // Sector boundaries as [x,y] on a 900x500 canvas — approximation of Nordschleife+GP
    // The path goes clockwise from start/finish
    {x:450,y:460}, // S/F line (sector 1 start)
    {x:520,y:450},{x:580,y:420},{x:640,y:380},{x:680,y:340}, // S1: GP section
    {x:700,y:290},{x:710,y:240},{x:700,y:190}, // S2: into Nordschleife
    {x:670,y:150},{x:630,y:120},{x:580,y:100},{x:520,y:80}, // S3: Hatzenbach/Hocheichen
    {x:460,y:65},{x:400,y:55},{x:340,y:50},{x:280,y:55}, // S4: Flugplatz area
    {x:220,y:70},{x:170,y:95},{x:140,y:130},{x:120,y:170}, // S5: Schwedenkreuz/Aremberg
    {x:105,y:220},{x:100,y:270},{x:110,y:320}, // S6: Karussell area
    {x:130,y:360},{x:160,y:390},{x:200,y:410},{x:250,y:420}, // S7: Brünnchen
    {x:300,y:425},{x:340,y:435},{x:380,y:445}, // S8: Pflanzgarten/Schwalbenschwanz
    {x:410,y:455},{x:430,y:460},{x:450,y:460}, // S9: back to S/F
];
// Sector boundary indices in TRACK_POINTS array
const SECTOR_BOUNDARIES = [0, 4, 7, 11, 15, 19, 22, 26, 29, 32];

function getTrackPosition(sectorIndex, progress) {
    // sectorIndex: 0-8, progress: 0-1 within sector
    const startIdx = SECTOR_BOUNDARIES[sectorIndex];
    const endIdx = SECTOR_BOUNDARIES[sectorIndex + 1] || TRACK_POINTS.length - 1;
    const segPoints = [];
    for (let i = startIdx; i <= endIdx; i++) segPoints.push(TRACK_POINTS[i]);
    if (segPoints.length < 2) return segPoints[0];
    const totalLen = segPoints.length - 1;
    const pos = progress * totalLen;
    const idx = Math.min(Math.floor(pos), totalLen - 1);
    const t = pos - idx;
    return {
        x: segPoints[idx].x + (segPoints[idx+1].x - segPoints[idx].x) * t,
        y: segPoints[idx].y + (segPoints[idx+1].y - segPoints[idx].y) * t,
    };
}

function getCarTrackInfo(car) {
    // Determine which sector the car is currently in based on filled sector times
    let lastFilledSector = 0;
    let sectorTimes = [];
    for (let i = 1; i <= 9; i++) {
        const st = car['S'+i+'TIME'];
        if (st && st.trim()) {
            lastFilledSector = i;
            sectorTimes.push(lapTimeToSeconds(st));
        } else {
            break;
        }
    }
    // Car is currently in sector (lastFilledSector + 1), or sector 1 if none filled
    const currentSector = lastFilledSector < 9 ? lastFilledSector : 0; // 0-indexed
    // Estimate progress within current sector using LASTIMTIME
    const now = Date.now();
    const lastIm = parseInt(car.LASTIMTIME) || now;
    const elapsed = (now - lastIm) / 1000;
    // Average sector time ~ avgLap / 9
    const avgLapSec = lapTimeToSeconds(car.LASTLAPTIME);
    const avgSectorTime = isFinite(avgLapSec) && avgLapSec > 0 ? avgLapSec / 9 : 60;
    const progress = Math.min(0.95, elapsed / avgSectorTime);
    return { sector: currentSector, progress, sectorTimes, lastFilledSector };
}

                <!-- Track outline -->
                <path d="${buildTrackPath()}" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="${buildTrackPath()}" fill="none" stroke="#1e293b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Sector markers -->
                ${SECTOR_BOUNDARIES.slice(0, 9).map((idx, i) => {
                    const p = TRACK_POINTS[idx];
                    return `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#475569"/>
                            <text x="${p.x}" y="${p.y - 10}" class="sector-label" text-anchor="middle">S${i+1}</text>`;
                }).join('')}

                <rect x="440" y="468" width="20" height="3" fill="#fff" rx="1"/>

        <div class="track-stats">
            <div class="track-stat"><div class="ts-label">Cars on Track</div><div class="ts-value">${R.length}</div></div>

            <div class="track-stat"><div class="ts-label">Fastest Lap</div><div class="ts-value">${R.reduce((b,r)=>{const t=lapTimeToSeconds(r.FASTESTLAP);return t<b.t?{t,s:`#${r.STNR} ${r.FASTESTLAP}`}:b;},{t:Infinity,s:'-'}).s}</div></div>
            <div class="track-stat"><div class="ts-label">Laps Completed</div><div class="ts-value">${R[0]?.LAPS||'-'}</div></div>

    // ── Traffic Prediction Section ──
    html += renderTrafficPrediction(R);

function buildTrackPath() {
    return 'M ' + TRACK_POINTS.map(p => `${p.x} ${p.y}`).join(' L ') + ' Z';
}

function renderCarDots(R) {
    let filtered = R.filter(r => trackFilterClasses.has(r.CLASSNAME));
    if (trackShowTop > 0) filtered = filtered.filter(r => r.POSITION <= trackShowTop);
    return filtered.map(r => {
        const info = getCarTrackInfo(r);
        const pos = getTrackPosition(info.sector, info.progress);
        const color = classColor(r.CLASSNAME);
        return `<circle class="car-dot" cx="${pos.x}" cy="${pos.y}" r="5" fill="${color}" stroke="#0f172a" stroke-width="1.5" onclick="showCarDetail('${r.STNR}')">
                    <title>#${r.STNR} ${r.TEAM} (P${r.POSITION}) - S${info.sector+1}</title>
                </circle>
                <text class="car-label" x="${pos.x}" y="${pos.y}">${r.STNR}</text>`;
    }).join('');
}

function toggleTrackClass(cls) {
    trackFilterClasses.has(cls) ? trackFilterClasses.delete(cls) : trackFilterClasses.add(cls);
    renderTrackMap();
}

// ── Traffic Prediction Engine ──
function renderTrafficPrediction(R) {
    // Build pace data for each car
    const cars = R.map(r => {
        const avgLapSec = lapTimeToSeconds(r.LASTLAPTIME);
        const bestLapSec = lapTimeToSeconds(r.FASTESTLAP);
        // Use race avg from stint data if available
        let raceAvgSec = avgLapSec;
        const si = stintsData ? stintsData.STINTS.find(s => s.STNR === r.STNR) : null;
        if (si) {
            let ts = 0, tl = 0;
            si.DRIVERS.forEach(d => {
                const l = parseInt(d.LAPS) || 0;
                const t = lapTimeToSeconds(d.TOTALTIME);
                if (l > 0 && isFinite(t)) { ts += t; tl += l; }
            });
            if (tl > 0) raceAvgSec = ts / tl;
        }
        // Parse gap to leader in seconds
        let gapSec = parseGapSeconds(r.GAP, r);
        return {
            stnr: r.STNR, team: r.TEAM, pos: r.POSITION, cls: r.CLASSNAME,
            laps: parseInt(r.LAPS) || 0, car: r.CAR, driver: r.NAME,
            avgLap: isFinite(raceAvgSec) ? raceAvgSec : 600,
            bestLap: isFinite(bestLapSec) ? bestLapSec : 600,
            gapToLeader: gapSec,
            trackInfo: getCarTrackInfo(r),
        };
    });

    // Find traffic encounters: when will a faster car catch a slower car ahead on track
    const encounters = [];
    // For top N cars, check against all slower cars that are physically close
    const topCars = cars.filter(c => c.pos <= 20); // Focus on top 20
    topCars.forEach(fast => {
        cars.forEach(slow => {
            if (fast.stnr === slow.stnr) return;
            if (fast.avgLap >= slow.avgLap) return; // fast must be faster
            const paceGapPerLap = slow.avgLap - fast.avgLap; // seconds gained per lap
            if (paceGapPerLap < 0.5) return; // negligible

            // Calculate current time gap between them
            let timeGap;
            if (fast.laps === slow.laps) {
                // Same lap: use gap difference to leader
                timeGap = slow.gapToLeader - fast.gapToLeader;
            } else if (fast.laps > slow.laps) {
                // Fast car is ahead by laps — slow car is being lapped
                const lapDiff = fast.laps - slow.laps;
                timeGap = (lapDiff * fast.avgLap) - (fast.gapToLeader - slow.gapToLeader);
            } else {
                return; // slow car ahead in laps — doesn't make sense for traffic
            }

            if (timeGap <= 0 || !isFinite(timeGap)) return;
            if (timeGap > fast.avgLap * 2) return; // more than 2 laps away, skip

            const lapsToEncounter = timeGap / paceGapPerLap;
            const timeToEncounter = lapsToEncounter * fast.avgLap;

            if (lapsToEncounter > 15) return; // too far out

            let severity = 'clear';
            if (timeGap < 5) severity = 'danger';
            else if (timeGap < 30) severity = 'warn';
            else if (lapsToEncounter < 3) severity = 'warn';

            encounters.push({
                fast, slow, timeGap, paceGapPerLap,
                lapsToEncounter, timeToEncounter, severity,
            });
        });
    });

    // Sort by urgency
    encounters.sort((a, b) => a.timeGap - b.timeGap);
    const topEncounters = encounters.slice(0, 30);

    let html = `<div class="traffic-section"><div class="traffic-container">
        <div class="track-header">
            <h2>Traffic Prediction</h2>
            <div style="color:#64748b;font-size:.75rem">${encounters.length} potential encounters detected</div>
        </div>`;

    if (topEncounters.length === 0) {
        html += '<p style="color:#64748b;padding:20px;text-align:center">No significant traffic encounters predicted</p>';
    } else {
        html += `<table class="traffic-table"><thead><tr>
            <th>Status</th><th>Fast Car</th><th>Slow Car</th><th>Current Gap</th>
            <th>Pace Δ/Lap</th><th>Catch In</th><th>Est. Time</th><th>Class</th>
        </tr></thead><tbody>`;
        topEncounters.forEach(e => {
            const tag = e.severity === 'danger' ? '<span class="traffic-tag danger">IN TRAFFIC</span>'
                      : e.severity === 'warn' ? '<span class="traffic-tag warn">APPROACHING</span>'
                      : '<span class="traffic-tag clear">CLEAR</span>';
            html += `<tr>
                <td style="font-family:inherit">${tag}</td>
                <td style="cursor:pointer" onclick="showCarDetail('${e.fast.stnr}')">
                    <span style="color:${classColor(e.fast.cls)}">#${e.fast.stnr}</span>
                    <span style="color:#94a3b8;font-family:inherit;font-size:.75rem"> P${e.fast.pos}</span>
                </td>
                <td style="cursor:pointer" onclick="showCarDetail('${e.slow.stnr}')">
                    <span style="color:${classColor(e.slow.cls)}">#${e.slow.stnr}</span>
                    <span style="color:#94a3b8;font-family:inherit;font-size:.75rem"> P${e.slow.pos}</span>
                </td>
                <td class="${e.severity==='danger'?'traffic-danger':e.severity==='warn'?'traffic-warn':''}">${secondsToTime(e.timeGap)}</td>
                <td>${e.paceGapPerLap.toFixed(1)}s</td>
                <td>${e.lapsToEncounter<1?'<1':e.lapsToEncounter.toFixed(1)} laps</td>
                <td>${secondsToTime(e.timeToEncounter)}</td>
                <td style="font-family:inherit;font-size:.75rem">${e.fast.cls} vs ${e.slow.cls}</td>
            </tr>`;
        });
        html += '</tbody></table>';
    }
    html += '</div></div>';
    return html;
}

function parseGapSeconds(gap, car) {
    if (!gap) return 0;
    // Format: "----LAP XX" means leader on that lap
    if (gap.includes('LAP')) return 0; // leader
    // Format: "MM:SS.mmm" or "SS.mmm"
    return lapTimeToSeconds(gap);
}
